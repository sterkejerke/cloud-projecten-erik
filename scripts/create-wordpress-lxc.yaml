---
- name: Create WordPress LXC Container
  hosts: localhost
  gather_facts: no

  vars:
    ctid: "{{ ctid | default('102') }}"
    hostname: "{{ hostname | default('wordpress-ansible') }}"
    ip: "{{ ip | default('10.24.52.102') }}"
    gateway: "10.24.52.1"
    bridge: "vmbr1"
    template: "local:vztmpl/debian-12-turnkey-wordpress_18.2-1_amd64.tar.gz"
    username: "wpuser{{ ctid }}"
    storage: "cephpool"

  tasks:
    - name: Create LXC container
      command: >
        pct create {{ ctid }} {{ template }}
        --hostname {{ hostname }}
        --cores 1
        --memory 1024
        --swap 512
        --rootfs {{ storage }}:30
        --net0 name=eth0,bridge={{ bridge }},ip={{ ip }}/24,gw={{ gateway }},rate=51200,firewall=1
        --unprivileged 0
        --features nesting=1

    - name: Configure Proxmox firewall (DROP policy, allow 22/80/443)
      copy:
        dest: "/etc/pve/firewall/{{ ctid }}.fw"
        content: |
          [OPTIONS]
          enable: 1
          policy_in: DROP
          policy_out: ACCEPT

          [RULES]
          IN ACCEPT -p tcp --dport 22 -log nolog
          IN ACCEPT -p tcp --dport 80 -log nolog
          IN ACCEPT -p tcp --dport 443 -log nolog

    - name: Start container
      command: pct start {{ ctid }}

    - name: Wait for container to boot
      pause:
        seconds: 15

    - name: Update apt cache
      command: pct exec {{ ctid }} -- bash -c "apt-get update -y -q"

    - name: Update all packages (via orchestration)
      command: pct exec {{ ctid }} -- bash -c "DEBIAN_FRONTEND=noninteractive apt-get upgrade -y -q"

    - name: Create unique SSH user
      command: pct exec {{ ctid }} -- bash -c "useradd -m -s /bin/bash {{ username }}"

    - name: Create SSH directory
      command: pct exec {{ ctid }} -- bash -c "mkdir -p /home/{{ username }}/.ssh && chmod 700 /home/{{ username }}/.ssh"

    - name: Generate unique SSH key for this container
      command: >
        ssh-keygen -t ed25519
        -f /root/.ssh/lxc-keys/id_ed25519_{{ ctid }}
        -N ""
        -C "{{ username }}@{{ hostname }}"
      args:
        creates: "/root/.ssh/lxc-keys/id_ed25519_{{ ctid }}"

    - name: Push public key into container
      command: pct push {{ ctid }} /root/.ssh/lxc-keys/id_ed25519_{{ ctid }}.pub /home/{{ username }}/.ssh/authorized_keys

    - name: Set correct SSH permissions
      command: >
        pct exec {{ ctid }} -- bash -c
        "chmod 600 /home/{{ username }}/.ssh/authorized_keys &&
         chown -R {{ username }}:{{ username }} /home/{{ username }}/.ssh"

    - name: Install Node Exporter for monitoring
      command: pct push {{ ctid }} /usr/local/bin/node_exporter /usr/local/bin/node_exporter
      ignore_errors: yes

    - name: Start Node Exporter (auto added to monitoring)
      command: >
        pct exec {{ ctid }} -- bash -c
        "chmod +x /usr/local/bin/node_exporter;
         nohup /usr/local/bin/node_exporter --web.listen-address=0.0.0.0:9100
         > /var/log/node_exporter.log 2>&1 &"
      ignore_errors: yes

    - name: Show result
      command: pct exec {{ ctid }} -- bash -c "echo 'WordPress ready at http://{{ ip }}'"

    - name: Show SSH access info
      debug:
        msg:
          - "Container {{ ctid }} aangemaakt!"
          - "SSH: ssh -i /root/.ssh/lxc-keys/id_ed25519_{{ ctid }} {{ username }}@{{ ip }}"
          - "WordPress: http://{{ ip }}/wp-admin"
          - "Monitoring: http://{{ ip }}:9100/metrics"